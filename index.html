<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verb Trainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-light: #daeeff;
    --blue-hover: #c4e4f8;
    --blue-dark: #1a4d70;
    --blue-label: #3a7aaa;
    --blue-border: #7bbfe8;
    --bg: #f0f8ff;
    --radius-card: 20px;
    --radius-btn: 50px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.25rem 3rem;
    color: var(--blue-dark);
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--blue-dark);
    letter-spacing: -0.01em;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 2rem;
  }

  .card {
    background: var(--blue-light);
    border: 1.5px solid var(--blue-border);
    border-radius: var(--radius-card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 160px;
    gap: 0;
    padding: 2rem 1rem 1.25rem;
  }

  .card-main {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--blue-dark);
    text-align: center;
    line-height: 1.2;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.12s ease, transform 0.12s ease;
  }

  .card-main.large {
    font-size: 22px;
  }

  .card-sub {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 11px;
    font-style: italic;
    color: var(--blue-label);
    text-align: center;
    line-height: 1.4;
    height: 16px;
    margin-top: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.12s ease, transform 0.12s ease;
  }

  .card-main.small {
    font-size: 15px;
    font-weight: 500;
    height: auto;
    margin-top: 12px;
  }
  .card-sub.animating {
    opacity: 0;
    transform: translateY(8px);
  }

  .refresh-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--blue-light);
    border: 1.5px solid var(--blue-border);
    border-radius: var(--radius-btn);
    padding: 14px 56px;
    font-size: 14px;
    font-weight: 500;
    color: var(--blue-dark);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .refresh-btn:hover { background: var(--blue-hover); }
  .refresh-btn:active { transform: scale(0.97); }

  @media (max-width: 520px) {
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>English Verb Trainer</h1>
</header>

<div class="cards">
  <div class="card">
    <div class="card-main" id="pronoun">Местоимение</div>
    <div class="card-sub" id="pronoun-ru">&nbsp;</div>
  </div>
  <div class="card">
    <div class="card-main" id="verb">Глагол</div>
    <div class="card-sub" id="verb-ru">&nbsp;</div>
  </div>
  <div class="card">
    <div class="card-main small" id="tense">Ситуация</div>
    <div class="card-sub" id="tense-sub">&nbsp;</div>
  </div></div>

<button class="refresh-btn" onclick="refresh()">Обновить</button>

<script>
const pronouns = [
  {en:'I',    ru:'Я'},
  {en:'We',   ru:'Мы'},
  {en:'You',  ru:'Ты / Вы'},
  {en:'He',   ru:'Он'},
  {en:'She',  ru:'Она'},
  {en:'It',   ru:'Оно'},
  {en:'They', ru:'Они'}
];

const verbs = [
  {en:'ask',ru:'спрашивать'},{en:'answer',ru:'отвечать'},{en:'look',ru:'смотреть'},
  {en:'watch',ru:'наблюдать'},{en:'listen',ru:'слушать'},{en:'talk',ru:'говорить'},
  {en:'walk',ru:'идти'},{en:'open',ru:'открывать'},{en:'close',ru:'закрывать'},
  {en:'call',ru:'звонить'},{en:'work',ru:'работать'},{en:'study',ru:'учиться'},
  {en:'learn',ru:'изучать'},{en:'start',ru:'начинать'},{en:'finish',ru:'заканчивать'},
  {en:'help',ru:'помогать'},{en:'change',ru:'менять'},{en:'like',ru:'нравиться'},
  {en:'love',ru:'любить'},{en:'hate',ru:'ненавидеть'},{en:'enjoy',ru:'наслаждаться'},
  {en:'want',ru:'хотеть'},{en:'need',ru:'нуждаться'},{en:'prefer',ru:'предпочитать'},
  {en:'decide',ru:'решать'},{en:'explain',ru:'объяснять'},{en:'remember',ru:'помнить'},
  {en:'try',ru:'пробовать'},{en:'move',ru:'двигаться'},{en:'stop',ru:'останавливаться'}
];

const situations = [
  'делалось вообще',
  'делается вообще',
  'будет делаться вообще',
  'делалось в тот момент',
  'делается в этот момент',
  'будет делаться в тот момент',
  'уже было сделано',
  'уже есть сделано',
  'уже будет сделано'
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function animateCard(id, val, large) {
  const el = document.getElementById(id);
  el.classList.add('animating');
  setTimeout(() => {
    el.textContent = val;
    if (large) el.classList.add('large');
    el.classList.remove('animating');
  }, 130);
}

function refresh() {
  const pronoun = pick(pronouns);
  const verb = pick(verbs);
  const sit = pick(situations);

  animateCard('pronoun', pronoun.en, true);
  animateCard('pronoun-ru', pronoun.ru);

  setTimeout(() => {
    animateCard('verb', verb.en, true);
    animateCard('verb-ru', verb.ru);
  }, 60);

  setTimeout(() => {
    animateCard('tense', sit);
    animateCard('tense-sub', '\u00a0');
  }, 120);
}
</script>
</body>
</html>
